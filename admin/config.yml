backend:
  name: github
  repo: CharlesTBetz/nmte.org
  branch: main

site_url: https://charlestbetz.github.io/nmte.org
display_url: https://charlestbetz.github.io/nmte.org

media_folder: "assets/images"
public_folder: "/nmte.org/assets/images"

collections:
  - name: "events"
    label: "Events"
    folder: "_events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["event_date", "title"]
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "event" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Event Date", name: "event_date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Time", name: "time", widget: "string", required: false, hint: "e.g. 7:00 PM or 5:30 PM doors, 6:30 PM show" }
      - { label: "Venue", name: "venue", widget: "string", required: false }
      - { label: "Capacity", name: "capacity", widget: "number", required: false }
      - { label: "Sold Out", name: "sold_out", widget: "boolean", required: false, default: false }
      - { label: "Ticket URL", name: "ticket_url", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Promo Image", name: "promo_image", widget: "image", required: false, hint: "Promotional flyer or poster" }
      - { label: "Program PDF", name: "program_url", widget: "file", required: false, hint: "Upload program PDF" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "news"
    label: "News"
    folder: "_news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD" }
      - { label: "Type", name: "type", widget: "string", hint: "e.g. Demo Release, Member Update, Industry News" }
      - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false, hint: "Feature on homepage" }
      - { label: "Featured Until", name: "featured_until", widget: "datetime", required: false, hint: "Auto-expire featuring" }
      - { label: "YouTube URL", name: "youtube_url", widget: "string", required: false }
      - { label: "Artist", name: "artist", widget: "string", required: false }
      - { label: "Composer", name: "composer", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "posts"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "post" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Categories", name: "categories", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false, hint: "Feature on homepage" }
      - { label: "Featured Until", name: "featured_until", widget: "datetime", required: false, hint: "Auto-expire featuring" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - label: "Home"
        name: "home"
        file: "index.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "home" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Who We Are"
        name: "who-we-are"
        file: "who-we-are.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "What We Do"
        name: "what-we-do"
        file: "what-we-do.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "About"
        name: "about"
        file: "about.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Contact"
        name: "contact"
        file: "contact.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Members"
        name: "members"
        file: "members.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "News"
        name: "news-page"
        file: "news.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Blog"
        name: "blog-page"
        file: "blog.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Events"
        name: "events-page"
        file: "events.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }

      - label: "Community"
        name: "community-page"
        file: "community.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
