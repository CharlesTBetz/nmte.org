title: New Musical Theatre Exchange
description: "Bringing together committed musical theatre writers in the Twin Cities"
url: "https://charlestbetz.github.io"
baseurl: "/nmte.org"

theme: minima

# Using unified _posts collection with type field instead of separate collections

header_pages:
  - updates.md
  - about.md
  - blog.md
  - community.md

# Using custom permalinks based on post type - see _layouts/post.html
# Events: /events/YYYY/MM/DD/title/  
# News: /news/YYYY/MM/DD/title/

plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md

include:
  - admin
